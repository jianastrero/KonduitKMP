name: iOS Tests

# Trigger manually from the GitHub Actions tab:
#   Actions → iOS Tests → Run workflow → select branch → Run
#
# To run automatically on PRs, add the following trigger:
#   pull_request:
#     branches: [ main ]
on:
  workflow_dispatch:

jobs:
  test-ios:
    name: iOS Simulator Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew iosSimulatorArm64Test
