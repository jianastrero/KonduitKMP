build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: true
  excludes: 'compose'

complexity:
  CyclomaticComplexMethod:
    threshold: 15
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 6
    constructorThreshold: 8
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInObjects: 15

formatting:
  active: true
  android: true
  autoCorrect: true
  MaximumLineLength:
    maxLineLength: 120

naming:
  FunctionNaming:
    # Allow Composable functions that start with uppercase
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'

style:
  MagicNumber:
    ignoreAnnotated:
      - 'Preview'
      - 'Composable'
  ReturnCount:
    max: 3
  UnusedPrivateMember:
    active: true

compose:
  CompositionLocalAllowlist:
    active: false
  ModifierMissing:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableStateAutoboxing:
    active: true
  MutableStateParameter:
    active: true
  PreviewNaming:
    active: true
  PreviewPublic:
    active: false
  RememberMissing:
    active: true
  UnstableCollections:
    active: true
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true
